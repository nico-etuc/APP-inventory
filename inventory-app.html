<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AssetScan — Inventaire</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161820;
    --surface2: #1e2028;
    --border: #2a2d38;
    --accent: #00e5a0;
    --accent2: #0099ff;
    --warn: #ff6b35;
    --text: #e8eaf2;
    --text2: #8a8fa8;
    --text3: #4a4f68;
    --radius: 12px;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; overflow-x: hidden; }

  /* LAYOUT */
  .app { display: flex; flex-direction: column; min-height: 100vh; max-width: 480px; margin: 0 auto; }
  .header { padding: 16px 20px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 100; }
  .header-logo { font-family: var(--mono); font-size: 15px; color: var(--accent); letter-spacing: 2px; }
  .header-sub { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .header-right { display: flex; gap: 10px; align-items: center; }
  .content { flex: 1; padding: 16px; padding-bottom: 90px; }
  .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 100; }
  .nav-btn { flex: 1; padding: 12px 4px 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; border: none; background: none; color: var(--text3); font-size: 10px; font-family: var(--sans); transition: color 0.2s; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-btn.scan-btn { background: var(--accent); color: var(--bg); border-radius: 0; margin: 6px 4px; border-radius: 10px; }
  .nav-btn.scan-btn svg { color: var(--bg); }

  /* CARDS */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .card-title { font-size: 13px; font-family: var(--mono); color: var(--text2); letter-spacing: 1px; text-transform: uppercase; }

  /* BADGES */
  .badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; font-family: var(--mono); }
  .badge-green { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.25); }
  .badge-blue { background: rgba(0,153,255,0.12); color: var(--accent2); border: 1px solid rgba(0,153,255,0.25); }
  .badge-orange { background: rgba(255,107,53,0.12); color: var(--warn); border: 1px solid rgba(255,107,53,0.25); }
  .badge-gray { background: rgba(138,143,168,0.12); color: var(--text2); border: 1px solid rgba(138,143,168,0.2); }

  /* INPUTS */
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 11px; color: var(--text2); font-family: var(--mono); letter-spacing: 1px; margin-bottom: 6px; text-transform: uppercase; }
  .form-input, .form-select, .form-textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 11px 14px; color: var(--text); font-family: var(--sans); font-size: 15px;
    outline: none; transition: border-color 0.2s; -webkit-appearance: none; appearance: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { min-height: 80px; resize: vertical; }
  .form-select option { background: var(--surface2); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 20px; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; font-family: var(--sans); }
  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-primary:active { opacity: 0.85; transform: scale(0.98); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: rgba(255,107,53,0.15); color: var(--warn); border: 1px solid rgba(255,107,53,0.3); }
  .btn-full { width: 100%; }
  .btn-sm { padding: 8px 14px; font-size: 13px; }
  .btn-icon { width: 38px; height: 38px; padding: 0; border-radius: 8px; }

  /* SCANNER */
  .scanner-wrap { position: relative; border-radius: var(--radius); overflow: hidden; background: #000; aspect-ratio: 1; }
  #qr-reader { width: 100% !important; }
  #qr-reader video { border-radius: var(--radius); }
  #qr-reader > div { border: none !important; }
  .scan-overlay { position: absolute; inset: 0; pointer-events: none; display: flex; align-items: center; justify-content: center; }
  .scan-frame { width: 60%; aspect-ratio: 1; border: 2px solid var(--accent); border-radius: 16px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.5); }
  .scan-frame::before, .scan-frame::after { content: ''; position: absolute; width: 20px; height: 20px; border-color: var(--accent); border-style: solid; }
  .scan-pulse { animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .scan-status { text-align: center; padding: 12px; font-family: var(--mono); font-size: 13px; color: var(--text2); }

  /* ASSET LIST */
  .asset-item { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; cursor: pointer; transition: border-color 0.2s; }
  .asset-item:active { border-color: var(--accent); }
  .asset-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .asset-info { flex: 1; min-width: 0; }
  .asset-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .asset-meta { font-size: 12px; color: var(--text2); margin-top: 3px; font-family: var(--mono); }
  .asset-arrow { color: var(--text3); }

  /* DETAIL VIEW */
  .detail-header { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 20px; }
  .detail-icon { width: 60px; height: 60px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
  .detail-title { font-size: 20px; font-weight: 600; }
  .detail-code { font-family: var(--mono); font-size: 12px; color: var(--text3); margin-top: 4px; }
  .field-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .field-row:last-child { border-bottom: none; }
  .field-key { font-size: 12px; color: var(--text2); font-family: var(--mono); }
  .field-val { font-size: 14px; color: var(--text); text-align: right; max-width: 60%; }

  /* DASHBOARD */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .stat-num { font-family: var(--mono); font-size: 28px; color: var(--accent); font-weight: 700; }
  .stat-label { font-size: 12px; color: var(--text2); margin-top: 4px; }

  /* SEARCH */
  .search-bar { position: relative; margin-bottom: 14px; }
  .search-bar input { padding-left: 40px; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); }

  /* MODAL */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: flex-end; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-height: 90vh; overflow-y: auto; padding: 20px; }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }

  /* TOAST */
  .toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--bg); padding: 10px 20px; border-radius: 30px; font-size: 14px; font-weight: 600; z-index: 300; font-family: var(--mono); animation: toastIn 0.3s ease; }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

  /* EXPORT SECTION */
  .export-box { background: var(--surface2); border: 1px dashed var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
  .export-icon { font-size: 36px; margin-bottom: 8px; }
  .queue-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: var(--surface2); border-radius: 8px; margin-bottom: 8px; }
  .queue-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--warn); animation: pulse 1s infinite; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 48px 20px; color: var(--text3); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; margin-bottom: 6px; color: var(--text2); }
  .empty-sub { font-size: 13px; }

  /* FILTER CHIPS */
  .chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; scrollbar-width: none; }
  .chips::-webkit-scrollbar { display: none; }
  .chip { white-space: nowrap; padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text2); transition: all 0.15s; }
  .chip.active { background: rgba(0,229,160,0.12); color: var(--accent); border-color: rgba(0,229,160,0.3); }

  .divider { height: 1px; background: var(--border); margin: 16px 0; }
  .section-title { font-family: var(--mono); font-size: 11px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── STORAGE ────────────────────────────────────────────────────────────────
const DB = {
  get: (k, def = []) => { try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch { return def; } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
};

const ASSETS_KEY = 'assetscan_assets';
const LOCATIONS_KEY = 'assetscan_locations';
const ENTITIES_KEY = 'assetscan_entities';
const QUEUE_KEY = 'assetscan_queue';

const uuid = () => crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2);
const now = () => new Date().toISOString();

// ─── SEED DATA ───────────────────────────────────────────────────────────────
const SEED_ENTITIES = [
  { id: 'e1', code: 'ETUC', name: 'ETUC — Confédération Européenne', color: '#00e5a0' },
  { id: 'e2', code: 'ETUI', name: 'ETUI — Institut Syndical Européen', color: '#0099ff' },
  { id: 'e3', code: 'EFFAT', name: 'EFFAT', color: '#ff6b35' },
];
const SEED_LOCATIONS = [
  { id: 'l1', name: 'BD du Roi Albert II — Bât A', parent: null },
  { id: 'l2', name: 'Salle serveurs', parent: 'l1' },
  { id: 'l3', name: 'Open space 3e étage', parent: 'l1' },
  { id: 'l4', name: 'Salle de réunion B12', parent: 'l1' },
];
const SEED_ASSETS = [
  { id: 'a1', code: 'SN-HP-20241001', code_type: 'manual', label: 'Laptop HP EliteBook 840', brand: 'HP', model: 'EliteBook 840 G10', serial: 'CZC4123XYZ', category: 'IT', status: 'In use', condition: 'Good', entity_id: 'e1', location_id: 'l3', location_detail: 'Bureau 3-12', assigned_to: 'Sophie Renard', assigned_date: '2024-01-15', notes: 'Windows 11 Pro, Bitlocker actif', manufacturer_url: 'https://support.hp.com', manufacturer_data: null, photos: [], scrape_queued: false, created_at: now(), updated_at: now(), synced: false },
  { id: 'a2', code: '4719543771329', code_type: 'EAN13', label: 'Switch Cisco SG350-28', brand: 'Cisco', model: 'SG350-28', serial: 'FTX2201B3KL', category: 'IT', status: 'In use', condition: 'New', entity_id: 'e1', location_id: 'l2', location_detail: 'Rack U12', assigned_to: null, assigned_date: null, notes: '28 ports, VLAN configuré', manufacturer_url: 'https://www.cisco.com', manufacturer_data: null, photos: [], scrape_queued: true, created_at: now(), updated_at: now(), synced: false },
];

function initDB() {
  if (!localStorage.getItem(ENTITIES_KEY)) DB.set(ENTITIES_KEY, SEED_ENTITIES);
  if (!localStorage.getItem(LOCATIONS_KEY)) DB.set(LOCATIONS_KEY, SEED_LOCATIONS);
  if (!localStorage.getItem(ASSETS_KEY)) DB.set(ASSETS_KEY, SEED_ASSETS);
  if (!localStorage.getItem(QUEUE_KEY)) DB.set(QUEUE_KEY, []);
}

// ─── ICONS ───────────────────────────────────────────────────────────────────
const Icon = ({ name, size = 20 }) => {
  const icons = {
    scan: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>,
    list: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
    home: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
    export: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
    plus: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" width={size} height={size}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    edit: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
    trash: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
    back: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><polyline points="15 18 9 12 15 6"/></svg>,
    check: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><polyline points="20 6 9 17 4 12"/></svg>,
    search: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
    clock: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
    arrow: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><polyline points="9 18 15 12 9 6"/></svg>,
  };
  return icons[name] || null;
};

const CATEGORY_EMOJI = { IT: '💻', Furniture: '🪑', AV: '📺', Vehicle: '🚗', Mobile: '📱', Network: '🔌', Other: '📦' };
const STATUS_BADGE = { 'In use': 'badge-green', 'In stock': 'badge-blue', 'Under repair': 'badge-orange', 'Decommissioned': 'badge-gray' };
const STATUS_FR = { 'In use': 'En service', 'In stock': 'En stock', 'Under repair': 'En réparation', 'Decommissioned': 'Réformé' };
const CONDITION_FR = { New: 'Neuf', Good: 'Bon état', Fair: 'Correct', Poor: 'Dégradé' };

// ─── TOAST ───────────────────────────────────────────────────────────────────
function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2200); return () => clearTimeout(t); }, []);
  return <div className="toast">{msg}</div>;
}

// ─── SCANNER SCREEN ──────────────────────────────────────────────────────────
function ScanScreen({ onScanned }) {
  const [scanning, setScanning] = useState(false);
  const [manual, setManual] = useState('');
  const [error, setError] = useState('');
  const scannerRef = useRef(null);
  const html5Ref = useRef(null);

  const startScan = useCallback(async () => {
    setError('');
    setScanning(true);
    try {
      await new Promise(r => setTimeout(r, 300));
      const scanner = new Html5Qrcode('qr-reader');
      html5Ref.current = scanner;
      await scanner.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 220, height: 220 } },
        (decoded) => {
          if (navigator.vibrate) navigator.vibrate(80);
          stopScan();
          onScanned(decoded, 'QR');
        },
        () => {}
      );
    } catch (e) {
      setError('Caméra inaccessible. Utilisez la saisie manuelle.');
      setScanning(false);
    }
  }, [onScanned]);

  const stopScan = useCallback(async () => {
    try { if (html5Ref.current) { await html5Ref.current.stop(); html5Ref.current = null; } } catch {}
    setScanning(false);
  }, []);

  useEffect(() => () => { try { html5Ref.current?.stop(); } catch {} }, []);

  return (
    <div>
      <div className="card" style={{ marginBottom: 16 }}>
        <div className="card-title" style={{ marginBottom: 14 }}>📷 Scanner un code</div>
        {!scanning ? (
          <button className="btn btn-primary btn-full" style={{ fontSize: 16, padding: '14px' }} onClick={startScan}>
            <Icon name="scan" /> Activer la caméra
          </button>
        ) : (
          <>
            <div className="scanner-wrap" ref={scannerRef}>
              <div id="qr-reader" style={{ width: '100%' }}></div>
            </div>
            <div className="scan-status scan-pulse">⬡ Pointez vers un QR code ou code-barres</div>
            <button className="btn btn-secondary btn-full" style={{ marginTop: 10 }} onClick={stopScan}>Arrêter</button>
          </>
        )}
        {error && <div style={{ color: 'var(--warn)', fontSize: 13, marginTop: 10, textAlign: 'center' }}>{error}</div>}
      </div>

      <div className="card">
        <div className="card-title" style={{ marginBottom: 12 }}>⌨️ Saisie manuelle</div>
        <div className="form-group">
          <input className="form-input" placeholder="Numéro de série, code asset…" value={manual} onChange={e => setManual(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter' && manual.trim()) { onScanned(manual.trim(), 'manual'); setManual(''); } }} />
        </div>
        <button className="btn btn-primary btn-full" disabled={!manual.trim()}
          onClick={() => { onScanned(manual.trim(), 'manual'); setManual(''); }}>
          Valider
        </button>
      </div>

      <div className="card" style={{ background: 'rgba(0,229,160,0.04)', borderColor: 'rgba(0,229,160,0.15)' }}>
        <div style={{ fontSize: 13, color: 'var(--text2)', lineHeight: 1.6 }}>
          <b style={{ color: 'var(--accent)' }}>Formats supportés</b><br />
          QR Code · EAN-13 · EAN-8 · Code 128 · UPC · DataMatrix · PDF417 · Code 39
        </div>
      </div>
    </div>
  );
}

// ─── ASSET FORM ───────────────────────────────────────────────────────────────
function AssetForm({ initial, entities, locations, onSave, onCancel }) {
  const [form, setForm] = useState(() => ({
    code: '', code_type: 'manual', label: '', brand: '', model: '', serial: '',
    category: 'IT', status: 'In use', condition: 'Good',
    entity_id: entities[0]?.id || '',
    location_id: locations[0]?.id || '', location_detail: '',
    assigned_to: '', assigned_date: '',
    notes: '', manufacturer_url: '',
    ...initial
  }));

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  return (
    <div>
      <div className="card">
        <div className="card-title" style={{ marginBottom: 14 }}>Identification</div>
        <div className="form-group">
          <label className="form-label">Code scanné / S/N</label>

// ─── ASSET DETAIL ─────────────────────────────────────────────────────────────

    ['Type code', asset.code_type],
    ['Marque / Modèle', `${asset.brand || '—'} ${asset.model || ''}`],
    ['Numéro de série', asset.serial || '—'],
    ['Catégorie', asset.category],
    ['Statut', <span className={`badge ${STATUS_BADGE[asset.status]}`}>{STATUS_FR[asset.status]}</span>],

    ['Entité', entity ? <span style={{ color: entity.color, fontWeight: 600 }}>{entity.code}</span> : '—'],

// ─── INVENTORY SCREEN ─────────────────────────────────────────────────────────
function InventoryScreen({ assets, entities, locations, onSelect }) {
  const [search, setSearch] = useState('');
  const [catFilter, setCatFilter] = useState('Tous');
  const [entityFilter, setEntityFilter] = useState('Toutes');

  const cats = ['Tous', ...Object.keys(CATEGORY_EMOJI)];
  const entityOpts = ['Toutes', ...entities.map(e => e.code)];

  const filtered = assets.filter(a => {
    const q = search.toLowerCase();
    const matchSearch = !q || a.label?.toLowerCase().includes(q) || a.code?.toLowerCase().includes(q) || a.brand?.toLowerCase().includes(q) || a.assigned_to?.toLowerCase().includes(q);
    const matchCat = catFilter === 'Tous' || a.category === catFilter;
    const entity = entities.find(e => e.id === a.entity_id);
    const matchEntity = entityFilter === 'Toutes' || entity?.code === entityFilter;
    return matchSearch && matchCat && matchEntity;
  });

  return (
    <div>
      <div className="search-bar">
        <span className="search-icon"><Icon name="search" size={16} /></span>
        <input className="form-input" style={{ paddingLeft: 40 }} placeholder="Chercher par nom, code, marque…" value={search} onChange={e => setSearch(e.target.value)} />
      </div>

      <div className="chips">
        {entityOpts.map(e => <div key={e} className={`chip ${entityFilter === e ? 'active' : ''}`} onClick={() => setEntityFilter(e)}>{e}</div>)}
      </div>
      <div className="chips">
        {cats.map(c => <div key={c} className={`chip ${catFilter === c ? 'active' : ''}`} onClick={() => setCatFilter(c)}>{CATEGORY_EMOJI[c] || ''} {c}</div>)}
      </div>

      <div style={{ fontSize: 12, color: 'var(--text3)', fontFamily: 'var(--mono)', marginBottom: 12 }}>{filtered.length} asset{filtered.length > 1 ? 's' : ''}</div>

      {filtered.length === 0 && (
        <div className="empty"><div className="empty-icon">🔍</div><div className="empty-text">Aucun résultat</div><div className="empty-sub">Modifiez vos filtres</div></div>
      )}

      {filtered.map(a => {
        const entity = entities.find(e => e.id === a.entity_id);
        const location = locations.find(l => l.id === a.location_id);
        return (
          <div key={a.id} className="asset-item" onClick={() => onSelect(a)}>
            <div className="asset-icon" style={{ background: 'var(--surface2)' }}>{CATEGORY_EMOJI[a.category] || '📦'}</div>
            <div className="asset-info">
              <div className="asset-name">{a.label}</div>
              <div className="asset-meta">
                {entity && <span style={{ color: entity.color }}>{entity.code} · </span>}
                {location?.name || 'Non localisé'}
              </div>
              <div style={{ marginTop: 4 }}>
                <span className={`badge ${STATUS_BADGE[a.status]}`} style={{ fontSize: 11 }}>{STATUS_FR[a.status]}</span>
                {a.scrape_queued && !a.manufacturer_data && <span style={{ marginLeft: 6, fontSize: 11, color: 'var(--warn)' }}>⏳</span>}
              </div>
            </div>
            <div className="asset-arrow"><Icon name="arrow" size={18} /></div>
          </div>
        );
      })}
    </div>
  );
}

  const total = assets.length;

    ...e, count: assets.filter(a => a.entity_id === e.id).length

// ─── EXPORT SCREEN ────────────────────────────────────────────────────────────
function ExportScreen({ assets, queue, onImport }) {
  const [tab, setTab] = useState('export');
  const fileRef = useRef();

  const exportJSON = () => {
    const data = {
      export_date: now(),
      version: '1.0',
      app: 'AssetScan',
      assets,
      scrape_queue: queue.map(q => ({ ...q, status: 'pending' }))
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = `assetscan_export_${new Date().toISOString().slice(0, 10)}.json`;
    a.click(); URL.revokeObjectURL(url);
  };

  const exportCSV = () => {
    const headers = ['id', 'code', 'code_type', 'label', 'brand', 'model', 'serial', 'category', 'status', 'condition', 'entity_id', 'location_id', 'location_detail', 'assigned_to', 'notes', 'created_at'];
    const rows = assets.map(a => headers.map(h => `"${(a[h] || '').toString().replace(/"/g, '""')}"`).join(','));
    const csv = [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = `assetscan_export_${new Date().toISOString().slice(0, 10)}.csv`;
    a.click(); URL.revokeObjectURL(url);
  };

  const handleImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        onImport(data);
      } catch { alert('Fichier JSON invalide'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  return (
    <div>
      <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
        {['export', 'import', 'queue'].map(t => (
          <button key={t} className={`btn ${tab === t ? 'btn-primary' : 'btn-secondary'} btn-sm`} style={{ flex: 1, textTransform: 'capitalize' }} onClick={() => setTab(t)}>
            {t === 'export' ? '📤 Export' : t === 'import' ? '📥 Import' : '🕷️ Queue'}
          </button>
        ))}
      </div>

      {tab === 'export' && (
        <div>
          <div className="section-title">Exporter les données</div>
          <div className="card" style={{ marginBottom: 12 }}>
            <div style={{ fontSize: 14, marginBottom: 14, color: 'var(--text2)' }}>
              Export JSON complet (assets + file Playwright). À copier sur le PC pour le script Playwright.
            </div>
            <button className="btn btn-primary btn-full" onClick={exportJSON}>
              <Icon name="export" size={18} /> Exporter JSON ({assets.length} assets)
            </button>
          </div>
          <div className="card">
            <div style={{ fontSize: 14, marginBottom: 14, color: 'var(--text2)' }}>
              Export CSV — tableau de bord Excel/Calc.
            </div>
            <button className="btn btn-secondary btn-full" onClick={exportCSV}>
              📊 Exporter CSV
            </button>
          </div>
          <div className="card" style={{ background: 'rgba(0,229,160,0.03)', borderColor: 'rgba(0,229,160,0.12)' }}>
            <div className="card-title" style={{ marginBottom: 10, color: 'var(--accent)' }}>Option A — Workflow PC</div>
            <div style={{ fontSize: 13, color: 'var(--text2)', lineHeight: 1.7 }}>
              1. Exporter le JSON depuis cette app<br />
              2. Copier le fichier sur votre PC<br />
              3. Lancer le script Playwright<br />
              4. Le script enrichit les fiches constructeur<br />
              5. Réimporter le JSON enrichi ici
            </div>
          </div>
        </div>
      )}

      {tab === 'import' && (
        <div>
          <div className="section-title">Importer un JSON enrichi</div>
          <div className="card">
            <div style={{ fontSize: 14, color: 'var(--text2)', marginBottom: 16, lineHeight: 1.6 }}>
              Importez le fichier JSON retourné par le script Playwright pour enrichir les fiches avec les données constructeur.
            </div>
            <div className="export-box" onClick={() => fileRef.current?.click()} style={{ cursor: 'pointer' }}>
              <div className="export-icon">📁</div>
              <div style={{ fontSize: 15, marginBottom: 4 }}>Choisir un fichier JSON</div>
              <div style={{ fontSize: 12, color: 'var(--text3)' }}>assetscan_enriched_*.json</div>
            </div>
            <input ref={fileRef} type="file" accept=".json" style={{ display: 'none' }} onChange={handleImport} />
          </div>
        </div>
      )}

      {tab === 'queue' && (
        <div>
          <div className="section-title">File d'attente Playwright</div>
          {queue.length === 0 ? (
            <div className="empty"><div className="empty-icon">✅</div><div className="empty-text">File vide</div><div className="empty-sub">Ajoutez des assets à scraper depuis leur fiche</div></div>
          ) : (
            <>
              <div style={{ fontSize: 13, color: 'var(--text2)', marginBottom: 12 }}>
                {queue.length} asset{queue.length > 1 ? 's' : ''} en attente d'enrichissement constructeur
              </div>
              {queue.map(q => (
                <div key={q.id} className="queue-item">
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 500 }}>{q.label}</div>
                    <div style={{ fontSize: 12, color: 'var(--text2)', fontFamily: 'var(--mono)' }}>{q.brand} {q.model}</div>
                  </div>
                  <div className="queue-dot" />
                </div>
              ))}
              <button className="btn btn-primary btn-full" style={{ marginTop: 12 }} onClick={exportJSON}>
                <Icon name="export" size={18} /> Exporter avec la file
              </button>
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  initDB();
  const [tab, setTab] = useState('home');
  const [assets, setAssets] = useState(() => DB.get(ASSETS_KEY));
  const [entities] = useState(() => DB.get(ENTITIES_KEY));
  const [locations] = useState(() => DB.get(LOCATIONS_KEY));
  const [queue, setQueue] = useState(() => DB.get(QUEUE_KEY));
  const [view, setView] = useState(null); // null | 'detail' | 'form' | 'new'
  const [selected, setSelected] = useState(null);
  const [toast, setToast] = useState(null);
  const [scannedCode, setScannedCode] = useState(null);

  const saveAssets = (a) => { setAssets(a); DB.set(ASSETS_KEY, a); };
  const saveQueue = (q) => { setQueue(q); DB.set(QUEUE_KEY, q); };
  const showToast = (msg) => { setToast(msg); };

  const handleScanned = (code, type) => {
    const existing = assets.find(a => a.code === code);
    if (existing) {
      setSelected(existing);
      setView('detail');
      setTab('inventory');
      showToast('✓ Asset trouvé');
    } else {
      setScannedCode({ code, code_type: type });
      setView('new');
      setTab('inventory');
    }
  };

  const handleSave = (form) => {
    const isNew = !form.id;
    const asset = { ...form, id: form.id || uuid(), created_at: form.created_at || now(), updated_at: now(), synced: false, manufacturer_data: form.manufacturer_data || null, scrape_queued: form.scrape_queued || false, photos: form.photos || [] };
    const updated = isNew ? [...assets, asset] : assets.map(a => a.id === asset.id ? asset : a);
    saveAssets(updated);
    setSelected(asset);
    setView('detail');
    showToast(isNew ? '✓ Asset créé' : '✓ Asset mis à jour');
  };

  const handleDelete = () => {
    const updated = assets.filter(a => a.id !== selected.id);
    const updatedQ = queue.filter(q => q.id !== selected.id);
    saveAssets(updated);
    saveQueue(updatedQ);
    setSelected(null); setView(null);
    showToast('Asset supprimé');
  };

  const handleQueueScrape = (id) => {
    const asset = assets.find(a => a.id === id);
    if (!asset) return;
    const updatedAssets = assets.map(a => a.id === id ? { ...a, scrape_queued: true } : a);
    const updatedQ = [...queue.filter(q => q.id !== id), { id, label: asset.label, brand: asset.brand, model: asset.model, manufacturer_url: asset.manufacturer_url, code: asset.code }];
    saveAssets(updatedAssets);
    saveQueue(updatedQ);
    setSelected({ ...asset, scrape_queued: true });
    showToast('🕷️ Ajouté à la file Playwright');
  };

  const handleImport = (data) => {
    if (!data.assets) { alert('Format invalide'); return; }
    const merged = data.assets.map(imported => {
      const existing = assets.find(a => a.id === imported.id);
      return existing ? { ...existing, manufacturer_data: imported.manufacturer_data || existing.manufacturer_data, scrape_queued: !imported.manufacturer_data, updated_at: now() } : imported;
    });
    const newIds = new Set(merged.map(a => a.id));
    const kept = assets.filter(a => !newIds.has(a.id));
    saveAssets([...kept, ...merged]);
    showToast(`✓ Import: ${data.assets.length} assets`);
  };

  const goBack = () => { setView(null); setSelected(null); setScannedCode(null); };

  const headerTitle = () => {
    if (view === 'detail') return selected?.label?.slice(0, 22) || 'Détail';
    if (view === 'form') return 'Modifier';
    if (view === 'new') return 'Nouvel asset';
    return { home: 'Tableau de bord', scan: 'Scanner', inventory: 'Inventaire', export: 'Export / Sync' }[tab];
  };

  return (
    <div className="app">
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}

      <div className="header">
        <div>
          {(view) ? (
            <button className="btn btn-secondary btn-sm" style={{ padding: '6px 12px' }} onClick={goBack}>
              <Icon name="back" size={16} /> Retour
            </button>
          ) : (
            <div>
              <div className="header-logo">ASSET<span style={{ color: 'var(--accent2)' }}>SCAN</span></div>
              <div className="header-sub">v1.0 — Option A</div>
            </div>
          )}
        </div>
        {view && <div style={{ fontWeight: 600, fontSize: 16, flex: 1, textAlign: 'center', paddingRight: 60 }}>{headerTitle()}</div>}
        {!view && tab === 'inventory' && (
          <button className="btn btn-primary btn-sm" onClick={() => { setScannedCode(null); setView('new'); }}>
            <Icon name="plus" size={16} />
          </button>
        )}
      </div>

      <div className="content">
        {!view && tab === 'home' && <Dashboard assets={assets} entities={entities} queue={queue} />}
        {!view && tab === 'scan' && <ScanScreen onScanned={handleScanned} />}
        {!view && tab === 'inventory' && <InventoryScreen assets={assets} entities={entities} locations={locations} onSelect={(a) => { setSelected(a); setView('detail'); }} />}
        {!view && tab === 'export' && <ExportScreen assets={assets} queue={queue} onImport={handleImport} />}

        {view === 'detail' && selected && (
          <AssetDetail asset={selected} entities={entities} locations={locations}
            onEdit={() => setView('form')}
            onDelete={handleDelete}
            onBack={goBack}
            onQueueScrape={handleQueueScrape}
          />
        )}
        {view === 'form' && selected && (
          <AssetForm initial={selected} entities={entities} locations={locations} onSave={handleSave} onCancel={() => setView('detail')} />
        )}
        {view === 'new' && (
          <AssetForm initial={scannedCode || {}} entities={entities} locations={locations} onSave={handleSave} onCancel={goBack} />
        )}
      </div>

      {!view && (
        <nav className="nav">
          {[
            { id: 'home', icon: 'home', label: 'Accueil' },
            { id: 'inventory', icon: 'list', label: 'Inventaire' },
            { id: 'scan', icon: 'scan', label: 'Scanner', primary: true },
            { id: 'export', icon: 'export', label: 'Export' },
          ].map(n => (
            <button key={n.id} className={`nav-btn ${tab === n.id ? 'active' : ''} ${n.primary ? 'scan-btn' : ''}`} onClick={() => setTab(n.id)}>
              <Icon name={n.icon} size={n.primary ? 24 : 22} />
              <span>{n.label}</span>
            </button>
          ))}
        </nav>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
